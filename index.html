<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rentals">
<title>Rental Portfolio</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d28; --card-border: #252836;
    --text: #e4e6eb; --muted: #6b7084;
    --green: #4ade80; --green-dim: #166534;
    --red: #f87171; --red-dim: #7f1d1d;
    --blue: #60a5fa; --amber: #fbbf24;
    --divider: #1e2030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 0 14px 14px;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    text-align: center; padding: 20px 0 16px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .updated { font-size: 10px; color: var(--muted); margin-top: 3px; }

  .summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 6px; }
  .summary-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 12px 8px; text-align: center;
  }
  .summary-card .label { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 4px; }
  .summary-card .value { font-size: 18px; font-weight: 700; }

  .portfolio-totals { display: none; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
  .portfolio-totals.active { display: grid; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); padding: 14px 4px 8px; font-weight: 600; }

  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 16px; overflow: hidden; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-header .left { display: flex; align-items: center; gap: 8px; }
  .card-header .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
  .card-header .name { font-size: 16px; font-weight: 700; }
  .card-header .address { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .cf-badge { font-size: 14px; font-weight: 700; padding: 4px 10px; border-radius: 8px; white-space: nowrap; }
  .cf-badge.positive { background: var(--green-dim); color: var(--green); }
  .cf-badge.negative { background: var(--red-dim); color: var(--red); }

  .metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px 6px; }
  .metric .label { font-size: 8.5px; text-transform: uppercase; letter-spacing: .3px; color: var(--muted); margin-bottom: 1px; }
  .metric .val { font-size: 13px; font-weight: 600; }

  .cf-bar { margin-top: 10px; height: 3px; border-radius: 2px; background: #252836; overflow: hidden; }
  .cf-bar .fill { height: 100%; border-radius: 2px; }

  /* Monthly detail */
  .monthly-detail {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .card.expanded .monthly-detail { max-height: 2000px; }

  .monthly-detail-inner {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--divider);
  }
  .md-label { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }

  .month-row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 1fr;
    gap: 4px; padding: 4px 0;
    border-bottom: 1px solid var(--divider);
    font-size: 11px;
  }
  .month-row.header-row { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .3px; font-weight: 600; border-bottom: 1px solid var(--card-border); }
  .month-row .mo { color: var(--muted); font-weight: 600; }
  .month-row .inc { color: var(--text); }
  .month-row .exp { color: var(--amber); }
  .month-row .cf { font-weight: 600; }
  .month-row .cf.pos { color: var(--green); }
  .month-row .cf.neg { color: var(--red); }

  .expense-detail {
    font-size: 9px; color: var(--muted); padding: 1px 0 3px 36px;
    border-bottom: 1px solid var(--divider);
  }

  .month-row.year-row { font-weight: 700; font-size: 12px; padding: 6px 0; background: rgba(96,165,250,0.06); border-radius: 6px; margin-bottom: 2px; border-bottom: none; }
  .month-row.year-row .mo { color: var(--blue); }
  .month-row.avg-row { border-top: 2px solid var(--card-border); border-bottom: none; font-weight: 700; padding-top: 6px; }

  .no-monthly { font-size: 11px; color: var(--muted); font-style: italic; padding: 8px 0; }

  /* Lifecycle */
  .lifecycle { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--divider); display: none; }
  .lifecycle.active { display: block; }
  .lifecycle .lc-label { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .lifecycle .lc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px 6px; }
  .lifecycle .lc-item .label { font-size: 8px; text-transform: uppercase; color: var(--muted); letter-spacing: .3px; }
  .lifecycle .lc-item .val { font-size: 12px; font-weight: 600; }

  .card-note { margin-top: 8px; font-size: 10px; color: var(--muted); font-style: italic; }
  .expand-hint { text-align: center; font-size: 9px; color: var(--muted); margin-top: 6px; }
  .card.expanded .expand-hint { display: none; }

  .footer { text-align: center; padding: 20px 0 10px; font-size: 10px; color: var(--muted); }

  @media (min-width: 500px) { .cards { display: grid; grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<div class="header">
  <h1>🏡 Rental Portfolio</h1>
  <div class="updated" id="updated"></div>
</div>
<div class="summary" id="summary"></div>
<div class="portfolio-totals" id="portfolio-totals"></div>
<div class="section-label">Properties</div>
<div class="cards" id="cards"></div>
<div class="footer">Renti 🏡</div>

<script>
const $ = s => document.querySelector(s);
const money = (n, short) => {
  if (n == null) return '—';
  const a = Math.abs(n);
  if (short && a >= 10000) return (n<0?'-':'') + '$' + (a/1000).toFixed(0) + 'k';
  if (short && a >= 1000) return (n<0?'-':'') + '$' + (a/1000).toFixed(1) + 'k';
  return (n<0?'-':'') + '$' + a.toLocaleString('en-US', {maximumFractionDigits:0});
};
const sign = n => n == null ? '—' : (n > 0 ? '+' : '') + money(n);
const pct = n => n != null ? n.toFixed(1) + '%' : '—';
// Compute derived values from raw monthly data
const mNoi = m => (m.income||0) - (m.expenses||0);
const mCf = m => (m.income||0) - (m.expenses||0) - (m.mortgage||0);

fetch('data.json?' + Date.now()).then(r => r.json()).then(data => {
  const d = new Date(data.lastUpdated + 'T12:00:00');
  $('#updated').textContent = 'Updated ' + d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

  // Trailing 12-month averages
  const p = data.portfolio;
  let t12n=0,t12m=0,t12c=0,t12k=0;
  data.properties.forEach(pr=>{const ms=pr.operations.monthly||[];ms.slice(-12).forEach(m=>{const i=m.income||0,e=m.expenses||0,mt=m.mortgage||0;t12n+=i-e;t12m+=mt;t12c+=i-e-mt;t12k++;});});
  const t12d=t12k>0?t12k/data.properties.length:1;
  const aN=Math.round(t12n/t12d),aM=Math.round(t12m/t12d),aC=Math.round(t12c/t12d);
  const cfColor = aC >= 0 ? 'var(--green)' : 'var(--red)';
  $('#summary').innerHTML = `
    <div class="summary-card"><div class="label">NOI / mo <span style="font-size:7px;opacity:.6">(12mo)</span></div><div class="value" style="color:var(--blue)">${money(aN,true)}</div></div>
    <div class="summary-card"><div class="label">Mortgages</div><div class="value" style="color:var(--amber)">${money(aM,true)}</div></div>
    <div class="summary-card"><div class="label">Cash Flow <span style="font-size:7px;opacity:.6">(12mo)</span></div><div class="value" style="color:${cfColor}">${sign(aC)}</div></div>
  `;

  if (p.totalValue || p.totalEquity || p.totalInvested) {
    const pt = $('#portfolio-totals');
    pt.classList.add('active');
    pt.innerHTML = [
      p.totalValue ? `<div class="summary-card"><div class="label">Total Value</div><div class="value">${money(p.totalValue,true)}</div></div>` : '',
      p.totalEquity ? `<div class="summary-card"><div class="label">Total Equity</div><div class="value" style="color:var(--green)">${money(p.totalEquity,true)}</div></div>` : '',
      p.totalInvested ? `<div class="summary-card"><div class="label">Invested</div><div class="value">${money(p.totalInvested,true)}</div></div>` : '',
    ].join('');
  }

  const maxCF = Math.max(...data.properties.map(p => {
    const ms = (p.operations.monthly||[]).slice(-12);
    return ms.length > 0 ? Math.abs(Math.round(ms.reduce((s,m) => s + mCf(m), 0) / ms.length)) : 0;
  }));

  $('#cards').innerHTML = data.properties.map(prop => {
    const ops = prop.operations;
    // Trailing 12-month cash flow per property
    const allMs = ops.monthly||[];
    const last12 = allMs.slice(-12);
    const cf = last12.length > 0 ? Math.round(last12.reduce((s,m) => s + mCf(m), 0) / last12.length) : 0;
    const dataMonths = allMs.length;
    // Compute averages from all months
    const avgNoi = allMs.length > 0 ? Math.round(allMs.reduce((s,m) => s + mNoi(m), 0) / allMs.length) : 0;
    const totalOcc = allMs.reduce((s,m) => s + (m.occupancy||0), 0);
    const avgOcc = allMs.length > 0 ? Math.round((totalOcc / allMs.length) * 1000) / 10 : 0;
    const cfCls = cf >= 0 ? 'positive' : 'negative';
    const dotColor = cf >= 0 ? 'var(--green)' : 'var(--red)';
    const barColor = cf >= 0 ? 'var(--green)' : 'var(--red)';
    const barW = Math.round((Math.abs(cf) / maxCF) * 100);
    const coverage = dataMonths < 12 ? ` <span style="color:var(--amber);font-size:9px">(${dataMonths}mo)</span>` : '';

    // Purchase
    const pur = prop.purchase;
    const hasPurchase = pur && (pur.price || pur.totalInvested || pur.rehabCosts);
    let purchaseHTML = '';
    if (hasPurchase) {
      purchaseHTML = `<div class="lifecycle active"><div class="lc-label">💰 Purchase</div><div class="lc-grid">
        ${pur.date ? `<div class="lc-item"><div class="label">Date</div><div class="val">${pur.date}</div></div>` : ''}
        ${pur.price ? `<div class="lc-item"><div class="label">Price</div><div class="val">${money(pur.price,true)}</div></div>` : ''}
        ${pur.downPayment ? `<div class="lc-item"><div class="label">Down</div><div class="val">${money(pur.downPayment,true)}</div></div>` : ''}
        ${pur.closingCosts ? `<div class="lc-item"><div class="label">Closing</div><div class="val">${money(pur.closingCosts,true)}</div></div>` : ''}
        ${pur.rehabCosts ? `<div class="lc-item"><div class="label">Rehab</div><div class="val">${money(pur.rehabCosts,true)}</div></div>` : ''}
        ${pur.refiClosingCosts ? `<div class="lc-item"><div class="label">Refi Costs</div><div class="val">${money(pur.refiClosingCosts,true)}</div></div>` : ''}
        ${pur.totalInvested ? `<div class="lc-item"><div class="label">Total In</div><div class="val" style="color:var(--amber)">${money(pur.totalInvested,true)}</div></div>` : ''}
      </div></div>`;
    }

    // Valuation
    const val = prop.valuation;
    const hasVal = val && (val.currentValue || val.equity || val.capRate);
    let valHTML = '';
    if (hasVal) {
      valHTML = `<div class="lifecycle active"><div class="lc-label">📊 Valuation</div><div class="lc-grid">
        ${val.currentValue ? `<div class="lc-item"><div class="label">Value</div><div class="val">${money(val.currentValue,true)}</div></div>` : ''}
        ${val.equity ? `<div class="lc-item"><div class="label">Equity</div><div class="val" style="color:var(--green)">${money(val.equity,true)}</div></div>` : ''}
        ${val.appreciationPct != null ? `<div class="lc-item"><div class="label">Apprec.</div><div class="val" style="color:${val.appreciationPct>=0?'var(--green)':'var(--red)'}">${val.appreciationPct>0?'+':''}${pct(val.appreciationPct)}</div></div>` : ''}
        ${val.capRate != null ? `<div class="lc-item"><div class="label">Cap Rate</div><div class="val">${pct(val.capRate)}</div></div>` : ''}
        ${val.cashOnCash != null ? `<div class="lc-item"><div class="label">CoC Return</div><div class="val" style="color:var(--green)">${pct(val.cashOnCash)}</div></div>` : ''}
      </div></div>`;
    }

    // Sale
    const sale = prop.sale;
    const hasSale = sale && sale.price;
    let saleHTML = '';
    if (hasSale) {
      saleHTML = `<div class="lifecycle active"><div class="lc-label">🏷️ Sale</div><div class="lc-grid">
        ${sale.date ? `<div class="lc-item"><div class="label">Date</div><div class="val">${sale.date}</div></div>` : ''}
        ${sale.price ? `<div class="lc-item"><div class="label">Sale Price</div><div class="val">${money(sale.price,true)}</div></div>` : ''}
        ${sale.netProceeds ? `<div class="lc-item"><div class="label">Net</div><div class="val" style="color:var(--green)">${money(sale.netProceeds,true)}</div></div>` : ''}
        ${sale.totalReturn ? `<div class="lc-item"><div class="label">Return</div><div class="val" style="color:var(--green)">${money(sale.totalReturn,true)}</div></div>` : ''}
        ${sale.annualizedReturn ? `<div class="lc-item"><div class="label">IRR</div><div class="val">${pct(sale.annualizedReturn)}</div></div>` : ''}
      </div></div>`;
    }


    // Monthly breakdown
    let monthlyHTML = '';
    if (ops.monthly && ops.monthly.length > 0) {
      // Group months by year
      // Only for Boone, reverse the monthly display order
      // Show all rentals newest month first
      let monthlyForDisplay = [...ops.monthly].slice().reverse();
      const years = {};
      monthlyForDisplay.forEach(m => {
        const yr = '20' + m.month.split(' ')[1];
        if (!years[yr]) years[yr] = [];
        years[yr].push(m);
      });

      // Build yearly summary rows
      const yearKeys = Object.keys(years).sort();
      const yearRows = yearKeys.map(yr => {
        const ms = years[yr];
        const totInc = ms.reduce((s,m) => s + m.income, 0);
        const totExp = ms.reduce((s,m) => s + m.expenses, 0);
        const totCF = ms.reduce((s,m) => s + mCf(m), 0);
        const avgCF = totCF / ms.length;
        const cfCl = totCF >= 0 ? 'pos' : 'neg';
        return `
          <div class="month-row year-row">
            <div class="mo">${yr}</div>
            <div class="inc">${money(Math.round(totInc))}</div>
            <div class="exp">${money(Math.round(totExp))}</div>
            <div class="cf ${cfCl}">${sign(Math.round(totCF))}</div>
          </div>
        `;
      }).join('');

      const rows = monthlyForDisplay.map(m => {
        const mCfVal = mCf(m);
        const cfCl = mCfVal >= 0 ? 'pos' : 'neg';
        const bk = m.breakdown && Object.keys(m.breakdown).length > 0
          ? Object.entries(m.breakdown).map(([k,v]) => `${k}: $${v}`).join(' · ')
          : '';
        return `
          <div class="month-row">
            <div class="mo">${m.month}</div>
            <div class="inc">${money(m.income)}</div>
            <div class="exp">${money(m.expenses)}</div>
            <div class="cf ${cfCl}">${sign(mCfVal)}</div>
          </div>
          ${bk ? `<div class="expense-detail">${bk}</div>` : ''}
        `;
      }).join('');

      const avgInc = ops.monthly.reduce((s,m) => s+m.income, 0) / ops.monthly.length;
      const avgExp = ops.monthly.reduce((s,m) => s+m.expenses, 0) / ops.monthly.length;
      const avgCF = cf;
      const avgCfCl = avgCF >= 0 ? 'pos' : 'neg';

      monthlyHTML = `
        <div class="monthly-detail">
          <div class="monthly-detail-inner">
            <div class="md-label">📊 Yearly Performance</div>
            <div class="month-row header-row">
              <div>Year</div><div>Income</div><div>Expenses</div><div>Cash Flow</div>
            </div>
            ${yearRows}
            <div style="margin-top:14px"></div>
            <div class="md-label">📅 Monthly Breakdown</div>
            <div class="month-row header-row">
              <div>Mo</div><div>Income</div><div>Expenses</div><div>Cash Flow</div>
            </div>
            ${rows}
            <div class="month-row avg-row">
              <div class="mo">AVG</div>
              <div class="inc">${money(Math.round(avgInc))}</div>
              <div class="exp" style="color:var(--amber)">${money(Math.round(avgExp))}</div>
              <div class="cf ${avgCfCl}">${sign(avgCF)}</div>
            </div>
            ${purchaseHTML}${valHTML}${saleHTML}
          </div>
        </div>
      `;
    } else {
      monthlyHTML = `
        <div class="monthly-detail">
          <div class="monthly-detail-inner">
            <div class="no-monthly">Full monthly data pending — using dashboard averages</div>
          </div>
        </div>
      `;
    }

    // Build total performance summary (visible before expanding)
    let totalPerfHTML = '';
    if (allMs.length > 0) {
      const tI = allMs.reduce((s,m) => s + m.income, 0);
      const tE = allMs.reduce((s,m) => s + m.expenses, 0);
      const tM = allMs.reduce((s,m) => s + (m.mortgage||0), 0);
      const tCF = tI - tE - tM;
      const aCF = Math.round(tCF / allMs.length);
      const cl = aCF >= 0 ? 'pos' : 'neg';
      // Compute ROI: (total cash flow + appreciation) / total invested
      const pur = prop.purchase||{};
      const invested = (pur.totalInvested||0) || ((pur.price||0)+(pur.closingCosts||0)+(pur.rehabCosts||0)+(pur.refiClosingCosts||0));
      const appreciation = ((prop.valuation||{}).currentValue||0) - (pur.price||0);
      const totalReturn = tCF + appreciation;
      const roi = invested > 0 ? Math.round((totalReturn / invested) * 1000) / 10 : 0;
      const annRoi = allMs.length > 0 && invested > 0 ? Math.round((roi / allMs.length) * 12 * 10) / 10 : 0;
      totalPerfHTML = `
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--divider)">
          <div class="md-label">📈 Total Performance <span style="font-size:8px;opacity:.6">(${allMs.length}mo since purchase)</span></div>
          <div class="month-row header-row"><div></div><div>Income</div><div>Expenses</div><div>Cash Flow</div></div>
          <div class="month-row year-row">
            <div class="mo">${allMs.length}mo</div>
            <div class="inc">${money(Math.round(tI))}</div>
            <div class="exp">${money(Math.round(tE))}</div>
            <div class="cf ${cl}">${sign(Math.round(tCF))}</div>
          </div>
          <div style="display:flex;gap:16px;font-size:10px;color:var(--muted);padding:4px 0 0 36px">
            <span>Avg CF: <b style="color:${aCF>=0?'var(--green)':'var(--red)'}">${sign(aCF)}/mo</b></span>
            <span>ROI: <b style="color:var(--green)">${roi}%</b></span>
            <span>Ann. ROI: <b style="color:var(--green)">${annRoi}%</b></span>
          </div>
        </div>
      `;
    }

    return `
      <div class="card" onclick="this.classList.toggle('expanded')">
        <div class="card-header">
          <div class="left">
            <span class="dot" style="background:${dotColor}"></span>
            <div>
              <div class="name">${prop.name}</div>
              <div class="address">${prop.address}${coverage}</div>
            </div>
          </div>
          <div class="cf-badge ${cfCls}">${sign(cf)}/mo</div>
        </div>
        <div class="metrics">
          <div class="metric"><div class="label">Rent</div><div class="val">$${ops.rent.toLocaleString()}</div></div>
          <div class="metric"><div class="label">NOI</div><div class="val" style="color:var(--blue)">$${avgNoi.toLocaleString()}</div></div>
          <div class="metric"><div class="label">Mortgage</div><div class="val">$${Math.round(prop.loan.payment||prop.loan.totalPayment||0).toLocaleString()}</div></div>
          <div class="metric"><div class="label">Occupancy</div><div class="val">${avgOcc}%</div></div>
        </div>
        <div class="cf-bar"><div class="fill" style="width:${barW}%;background:${barColor}"></div></div>
        ${totalPerfHTML}
        <div class="expand-hint">tap for detail ▾</div>
        ${monthlyHTML}
        ${prop.notes ? `<div class="card-note">${prop.notes}</div>` : ''}
      </div>
    `;
  }).join('');
});
</script>
</body>
</html>
