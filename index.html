<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rental Portfolio</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d28;
    --card-border: #252836;
    --text: #e4e6eb;
    --muted: #8b8fa3;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --amber: #fbbf24;
    --accent: #818cf8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    text-align: center;
    padding: 12px 0 20px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header .updated {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Portfolio summary bar */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .summary-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .summary-card .value {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* Property cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .card:active { transform: scale(0.97); }

  .card .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .card .name-row {
    display: flex;
    align-items: center;
    margin-bottom: 4px;
  }
  .card .name {
    font-size: 16px;
    font-weight: 700;
  }
  .card .address {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .card .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 8px;
  }
  .metric .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .metric .value {
    font-size: 15px;
    font-weight: 600;
  }
  .metric .value.positive { color: var(--green); }
  .metric .value.negative { color: var(--red); }

  .card .cash-flow-bar {
    margin-top: 14px;
    height: 4px;
    border-radius: 2px;
    background: #252836;
    overflow: hidden;
  }
  .card .cash-flow-bar .fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .card .note {
    margin-top: 10px;
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.3;
  }

  /* Future: value section placeholder */
  .card .value-section {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--card-border);
    display: none;
  }
  .card .value-section.active { display: block; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 0 8px;
    font-size: 10px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏡 Rental Portfolio</h1>
  <div class="updated" id="updated"></div>
</div>

<div class="summary" id="summary"></div>
<div class="cards" id="cards"></div>
<div class="footer">Data from Renti 🏡 • Updated manually</div>

<script>
const $ = s => document.querySelector(s);
const fmt = n => {
  if (n == null) return '—';
  const abs = Math.abs(n);
  const str = abs >= 1000 ? '$' + (abs/1000).toFixed(1) + 'k' : '$' + abs.toLocaleString();
  return n < 0 ? '-' + str : (n > 0 ? '+' + str : str);
};
const fmtFull = n => {
  if (n == null) return '—';
  return (n < 0 ? '-' : n > 0 ? '+' : '') + '$' + Math.abs(n).toLocaleString();
};

fetch('data.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    // Updated
    $('#updated').textContent = 'Updated ' + new Date(data.lastUpdated + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    // Summary
    const p = data.portfolio;
    const cfClass = p.totalMonthlyCashFlow >= 0 ? 'positive' : 'negative';
    $('#summary').innerHTML = `
      <div class="summary-card">
        <div class="label">Monthly NOI</div>
        <div class="value" style="color:var(--blue)">${fmtFull(p.totalMonthlyNOI)}</div>
      </div>
      <div class="summary-card">
        <div class="label">Mortgages</div>
        <div class="value" style="color:var(--amber)">${fmtFull(-p.totalMonthlyMortgage)}</div>
      </div>
      <div class="summary-card">
        <div class="label">Cash Flow</div>
        <div class="value ${cfClass}">${fmtFull(p.totalMonthlyCashFlow)}</div>
      </div>
    `;

    // Cards
    const maxCF = Math.max(...data.properties.map(p => Math.abs(p.monthlyCashFlow)));
    
    $('#cards').innerHTML = data.properties.map(prop => {
      const cf = prop.monthlyCashFlow;
      const cfClass = cf >= 0 ? 'positive' : 'negative';
      const dotColor = cf >= 0 ? 'var(--green)' : 'var(--red)';
      const barColor = cf >= 0 ? 'var(--green)' : 'var(--red)';
      const barWidth = Math.round((Math.abs(cf) / maxCF) * 100);
      const occ = prop.occupancy != null ? prop.occupancy + '%' : '—';
      
      const valueSection = prop.value != null ? `
        <div class="value-section active">
          <div class="metrics">
            <div class="metric">
              <div class="label">Value</div>
              <div class="value">${fmtFull(prop.value)}</div>
            </div>
            ${prop.appreciation != null ? `
            <div class="metric">
              <div class="label">Appreciation</div>
              <div class="value ${prop.appreciation >= 0 ? 'positive' : 'negative'}">${prop.appreciation > 0 ? '+' : ''}${prop.appreciation}%</div>
            </div>` : ''}
          </div>
        </div>
      ` : `<div class="value-section"></div>`;

      return `
        <div class="card">
          <div class="name-row">
            <span class="dot" style="background:${dotColor}"></span>
            <span class="name">${prop.name}</span>
          </div>
          <div class="address">${prop.address}</div>
          <div class="metrics">
            <div class="metric">
              <div class="label">Rent</div>
              <div class="value">$${prop.rent.toLocaleString()}</div>
            </div>
            <div class="metric">
              <div class="label">Mortgage</div>
              <div class="value">$${Math.round(prop.mortgage).toLocaleString()}</div>
            </div>
            <div class="metric">
              <div class="label">NOI/mo</div>
              <div class="value" style="color:var(--blue)">$${prop.monthlyNOI.toLocaleString()}</div>
            </div>
            <div class="metric">
              <div class="label">Cash Flow</div>
              <div class="value ${cfClass}">${fmtFull(cf)}</div>
            </div>
          </div>
          <div class="cash-flow-bar">
            <div class="fill" style="width:${barWidth}%;background:${barColor}"></div>
          </div>
          ${prop.notes ? `<div class="note">${prop.notes}</div>` : ''}
          ${valueSection}
        </div>
      `;
    }).join('');
  });
</script>
</body>
</html>
